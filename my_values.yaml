arborist:
  enabled: true

portal:
  resources:
    requests:
      cpu: 2.0
      memory: 4096Mi
    limits:
      cpu: 2.0
      memory: 8192Mi

fence:
  FENCE_CONFIG:
    # if true, will bypass OIDC login, and login a user with username "test"
    # WARNING: DO NOT ENABLE IN PRODUCTION (for testing purposes only)
    MOCK_AUTH: true

  USER_YAML: |
    authz:
      # policies automatically given to anyone, even if they are not authenticated
      anonymous_policies:
      - open_data_reader

      # policies automatically given to authenticated users (in addition to their other policies)
      all_users_policies: []

      groups:
      # can CRUD programs and projects and upload data files
      - name: data_submitters
        policies:
        - services.sheepdog-admin
        - data_upload
        - MyFirstProject_submitter
        users:
        - username1@gmail.com

      # can create/update/delete indexd records
      - name: indexd_admins
        policies:
        - indexd_admin
        users:
        - username1@gmail.com

      resources:
      - name: workspace
      - name: data_file
      - name: services
        subresources:
        - name: sheepdog
          subresources:
          - name: submission
            subresources:
            - name: program
            - name: project
        - name: 'indexd'
          subresources:
            - name: 'admin'
        - name: audit
          subresources:
            - name: presigned_url
            - name: login
      - name: open
      - name: programs
        subresources:
        - name: MyFirstProgram
          subresources:
          - name: projects
            subresources:
            - name: MyFirstProject
      - name: 'mds_gateway'
        description: 'commons /mds-admin'


      policies:
      - id: workspace
        description: be able to use workspace
        resource_paths:
        - /workspace
        role_ids:
        - workspace_user
      - id: data_upload
        description: upload raw data files to S3
        role_ids:
        - file_uploader
        resource_paths:
        - /data_file
      - id: services.sheepdog-admin
        description: CRUD access to programs and projects
        role_ids:
          - sheepdog_admin
        resource_paths:
          - /services/sheepdog/submission/program
          - /services/sheepdog/submission/project
      - id: indexd_admin
        description: full access to indexd API
        role_ids:
          - indexd_admin
        resource_paths:
          - /programs
      - id: open_data_reader
        role_ids:
          - peregrine_reader
          - guppy_reader
          - fence_storage_reader
        resource_paths:
        - /open
      - id: all_programs_reader
        role_ids:
        - peregrine_reader
        - guppy_reader
        - fence_storage_reader
        resource_paths:
        - /programs
      - id: MyFirstProject_submitter
        role_ids:
        - reader
        - creator
        - updater
        - deleter
        - storage_reader
        - storage_writer
        resource_paths:
        - /programs/MyFirstProgram/projects/MyFirstProject
      - id: mds_admin
        role_ids:
        - mds_user
        resource_paths:
        - /mds_gateway

      roles:
      - id: file_uploader
        permissions:
        - id: file_upload
          action:
            service: fence
            method: file_upload
      - id: workspace_user
        permissions:
        - id: workspace_access
          action:
            service: jupyterhub
            method: access
      - id: sheepdog_admin
        description: CRUD access to programs and projects
        permissions:
        - id: sheepdog_admin_action
          action:
            service: sheepdog
            method: '*'
      - id: indexd_admin
        description: full access to indexd API
        permissions:
        - id: indexd_admin
          action:
            service: indexd
            method: '*'
      - id: admin
        permissions:
          - id: admin
            action:
              service: '*'
              method: '*'
      - id: creator
        permissions:
          - id: creator
            action:
              service: '*'
              method: create
      - id: reader
        permissions:
          - id: reader
            action:
              service: '*'
              method: read
      - id: updater
        permissions:
          - id: updater
            action:
              service: '*'
              method: update
      - id: deleter
        permissions:
          - id: deleter
            action:
              service: '*'
              method: delete
      - id: storage_writer
        permissions:
          - id: storage_creator
            action:
              service: '*'
              method: write-storage
      - id: storage_reader
        permissions:
          - id: storage_reader
            action:
              service: '*'
              method: read-storage
      - id: peregrine_reader
        permissions:
        - id: peregrine_reader
          action:
            method: read
            service: peregrine
      - id: guppy_reader
        permissions:
        - id: guppy_reader
          action:
            method: read
            service: guppy
      - id: fence_storage_reader
        permissions:
        - id: fence_storage_reader
          action:
            method: read-storage
            service: fence
      - id: mds_user
        permissions:
          - id: mds_access
            action:
              method: '*'
              service: mds_gateway

    clients:
      wts:
        policies:
        - all_programs_reader
        - open_data_reader

    users:
      username1@gmail.com: {}
      username2:
        tags:
          name: John Doe
          email: johndoe@gmail.com
        policies:
        - MyFirstProject_submitter
      test:
        admin: True
        policies:
          - services.sheepdog-admin
          - MyFirstProject_submitter
          - workspace
          - data_upload
          - indexd_admin
          - open_data_reader
          - all_programs_reader
          - mds_admin

    cloud_providers: {}
    groups: {}

pub-sub:
  enabled: true

  image:
    repository: pub-sub
    tag: "test"
    pullPolicy: Never

fed-learn:
  enabled: false

  image:
    repository: fed-learn
    tag: "test"
    pullPolicy: Never

metadata:
  enabled: true
  resources:
    requests:
      memory: 4096Mi
    limits:
      memory: 8192Mi

  image:
    repository: metadata-my-test
    tag: "new"
    pullPolicy: Never
  postgres:
    dbcreate: true
    separate: true

  debug: true

  esEndpoint: http://gen3-elasticsearch-master:9200
  useAggMds: "True"
  aggMdsNamespace: default_namespace

  elasticsearch:
    separate: false
    clusterName: gen3-elasticsearch
